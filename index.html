<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App - By Solo</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="todo-header">
      <h2>ToDo List</h2>
      <div class="book">
        <img src="/images/book_writing.gif" />
      </div>
    </div>

    <div class="todo-body">
      <input type="text" id="taskInput" class="task-input" placeholder="Add your task" />
      <img src="images/plus.png" alt="+" id="addTaskBtn" onclick="OnAddTaskClick()">
    </div>
    <ul id="taskList" class="task-list"></ul>
    
    <!-- VERSION -->
    <p class="version">Version 2.0.0</p>
  </div>
  <script type="text/javascript" src="script.js"></script>
</body>

</html>
